<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title> YtMusic Playlist Manager</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#580045",
                        "surface-container-low": "#131318",
                        "on-primary-fixed": "#000000",
                        "tertiary-dim": "#a533ff",
                        "background": "#0e0e13",
                        "surface": "#0e0e13",
                        "error-dim": "#d73357",
                        "on-primary": "#5c0048",
                        "tertiary": "#c47fff",
                        "primary-container": "#ff66d0",
                        "inverse-primary": "#b2008e",
                        "primary-fixed": "#ff66d0",
                        "primary-fixed-dim": "#ff3fcd",
                        "surface-dim": "#0e0e13",
                        "error-container": "#a70138",
                        "error": "#ff6e84",
                        "secondary-container": "#006970",
                        "primary-dim": "#ff5fd0",
                        "primary": "#ff83d5",
                        "on-secondary-fixed-variant": "#005e64",
                        "on-surface": "#f8f5fd",
                        "surface-bright": "#2c2b33",
                        "on-background": "#f8f5fd",
                        "inverse-surface": "#fbf8ff",
                        "on-tertiary-fixed-variant": "#580092",
                        "on-secondary-fixed": "#003f43",
                        "tertiary-fixed-dim": "#c787ff",
                        "surface-container-high": "#1f1f26",
                        "secondary-fixed-dim": "#00deec",
                        "secondary": "#00eefc",
                        "on-secondary-container": "#e3fdff",
                        "outline": "#76747b",
                        "surface-container-highest": "#25252c",
                        "on-tertiary": "#340059",
                        "surface-container-lowest": "#000000",
                        "on-tertiary-container": "#ffffff",
                        "secondary-fixed": "#00eefc",
                        "tertiary-fixed": "#d199ff",
                        "on-error": "#490013",
                        "on-error-container": "#ffb2b9",
                        "surface-container": "#19191f",
                        "inverse-on-surface": "#55545a",
                        "on-secondary": "#005359",
                        "on-primary-container": "#480038",
                        "surface-tint": "#ff83d5",
                        "tertiary-container": "#9d05ff",
                        "outline-variant": "#48474d",
                        "on-surface-variant": "#acaab1",
                        "secondary-dim": "#00deec",
                        "on-tertiary-fixed": "#280047",
                        "surface-variant": "#25252c"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"], "body": ["Manrope"], "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24 }
        .bg-aura-glow {
            background: radial-gradient(circle at 10% 20%, rgba(255, 131, 213, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(0, 238, 252, 0.06) 0%, transparent 50%);
        }
        /* Fixed Background Image Implementation */
        .bg-stage-texture {
            background-image: linear-gradient(to bottom, rgba(14, 14, 19, 0.8), rgba(14, 14, 19, 0.9)),
                              url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen relative overflow-x-hidden bg-stage-texture">

    <div class="fixed inset-0 bg-aura-glow pointer-events-none -z-10"></div>

    <form id="delete-form" action="/delete-group" method="POST" style="display:none;">
        <input type="hidden" id="delete-group-input" name="group" value="">
    </form>
    <form id="add-artist-form" action="/add-group" method="POST" style="display:none;">
        <input id="hidden-group-name" name="group" type="hidden">
    </form>

    <header class="bg-neutral-950/70 backdrop-blur-xl sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4 border-b border-white/5">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">queue_music</span>

        </div>

    </header>

    <main class="max-w-4xl mx-auto px-6 py-12 lg:py-20">
        <div class="mb-12 text-center">
            <h2 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tighter text-on-surface mb-4">
                YtMusic <span class="text-primary italic">Manager</span>
            </h2>
            <p class="text-on-surface-variant font-medium tracking-widest uppercase text-xs opacity-70">
                Keep up with your Favourite Artists without breaking a sweat
            </p>
        </div>

        <div class="bg-surface-container/60 backdrop-blur-3xl rounded-xl p-8 md:p-12 shadow-2xl border border-white/5 relative">
            <form id="run-form" action="/run" method="POST" class="space-y-12">

                <div class="space-y-4">
                    <label class="block font-headline text-sm font-bold uppercase tracking-widest text-secondary ml-1">Playlist Source URL</label>
                    <div class="relative group">
                        <input class="w-full bg-surface-container-lowest border-none rounded-lg px-6 py-5 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-tertiary transition-all outline-none"
                               name="playlist_url" placeholder="https://music.youtube.com/playlist?list=..." type="text" required>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="flex justify-between items-end">
                        <label class="block font-headline text-sm font-bold uppercase tracking-widest text-primary ml-1">Target Artists</label>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        {% for group in groups %}
                        <div class="relative group flex items-center justify-between bg-surface-container-low hover:bg-surface-container-high border border-white/5 p-3 rounded-full transition-all">
                            <div class="flex items-center overflow-hidden">
                                <input checked class="w-5 h-5 rounded-full border-2 border-secondary/30 bg-surface-container-highest text-secondary focus:ring-secondary cursor-pointer"
                                       name="groups" type="checkbox" value="{{ group }}">
                                <span class="ml-3 font-semibold text-sm text-on-surface truncate">{{ group }}</span>
                            </div>
                            <button type="button" onclick="deleteGroup('{{ group }}')" class="w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-full bg-error-container/20 text-error hover:bg-error-container transition-colors">
                                <span class="material-symbols-outlined text-sm">close</span>
                            </button>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="pt-10 flex flex-col items-center gap-4">
                    <button type="submit" class="group relative px-16 py-5 bg-primary rounded-full font-black tracking-[0.2em] text-on-primary-fixed uppercase shadow-[0_0_20px_rgba(255,131,213,0.4)] hover:shadow-[0_0_40px_rgba(255,131,213,0.6)] active:scale-95 transition-all duration-300">
                        <span class="relative z-10">Initiate Sync</span>
                    </button>
                    <p class="text-on-surface-variant text-[10px] font-bold uppercase tracking-widest animate-pulse">Ready to Sync Playlists</p>
                </div>
            </form>

            <div class="mt-10 pt-6 border-t border-white/5">
                <div class="flex flex-col md:flex-row gap-3">
                    <input class="flex-grow bg-surface-container-low border-none rounded-full px-6 py-3 text-sm focus:ring-1 focus:ring-secondary transition-all"
                           id="new-artist-name" placeholder="Enter artist name (e.g. NewJeans)" type="text">
                    <button onclick="addArtistAction()" class="bg-secondary-container/20 text-secondary border border-secondary/20 font-bold px-8 py-3 rounded-full hover:bg-secondary hover:text-on-secondary transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-xl">add</span> ADD ARTIST
                    </button>
                </div>
            </div>
        </div>
    </main>


    <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[110] flex items-center justify-center hidden">
        <div class="bg-surface-container p-8 rounded-xl border border-white/10 max-w-xs w-full text-center">
            <p id="modal-message" class="text-on-surface font-bold mb-6">Remove artist?</p>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-2 rounded-full bg-surface-variant text-on-surface">Cancel</button>
                <button id="modal-confirm-btn" class="flex-1 py-2 rounded-full bg-error text-on-error font-bold">Remove</button>
            </div>
        </div>
    </div>

    <script>
        function addArtistAction() {
            const input = document.getElementById('new-artist-name');
            const name = input.value.trim();
            if (name) {
                document.getElementById('hidden-group-name').value = name;
                document.getElementById('add-artist-form').submit();
            }
        }

        function deleteGroup(name) {
            document.getElementById("modal-message").textContent = `Remove ${name} from your list?`;
            document.getElementById("modal-overlay").classList.remove('hidden');
            document.getElementById("modal-confirm-btn").onclick = function() {
                document.getElementById("delete-group-input").value = name;
                document.getElementById("delete-form").submit();
            };
        }

        function closeModal() {
            document.getElementById("modal-overlay").classList.add('hidden');
        }


    </script>
</body>
</html>
