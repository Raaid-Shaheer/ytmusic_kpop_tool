<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Processing... | Disco Syncer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
                "background": "#0e0e13",
                "surface": "#0e0e13",
                "primary": "#ff83d5",
                "secondary": "#00eefc",
                "error": "#ff6e84",
                "on-surface": "#f8f5fd",
                "on-surface-variant": "#acaab1",
                "surface-container": "#19191f",
            },
            fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Manrope"] }
          },
        },
      }
    </script>
    <style>
      .bg-stage-texture {
        background-image: linear-gradient(to bottom, rgba(14,14,19,0.9), rgba(14,14,19,0.95)),
                          url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&q=80');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(0, 238, 252, 0.2);
        border-top-color: #00eefc;
        border-radius: 9999px;
        animation: spin 1s linear infinite;
      }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen bg-stage-texture flex items-center justify-center">

<main class="w-full max-w-lg mx-auto px-6 text-center">

    <div class="font-headline font-bold tracking-tighter text-2xl italic text-primary mb-12">
        Disco Syncer
    </div>

    <div class="flex justify-center mb-8">
        <div class="spinner"></div>
    </div>

    <h1 class="font-headline text-3xl font-extrabold tracking-tighter mb-2">
        Syncing your playlists...
    </h1>
    <p class="text-on-surface-variant text-sm mb-10">This may take a minute. Hang tight!</p>

    <!-- steps log -->
    <div id="steps" class="text-left space-y-2 mb-8"></div>

    <!-- error box (hidden by default) -->
    <div id="error-box" style="display:none" class="bg-surface-container rounded-xl p-6 border border-error/30 text-left">
        <p class="text-error font-bold mb-1">Something went wrong</p>
        <p id="error-msg" class="text-on-surface-variant text-sm mb-4"></p>
        <a href="/" class="inline-block px-6 py-2 bg-white text-black rounded-full font-black text-xs uppercase tracking-widest hover:scale-105 transition-transform">
            Try Again
        </a>
    </div>

</main>

<script>
    const stepsDiv = document.getElementById("steps");
    const errorBox = document.getElementById("error-box");
    const errorMsg = document.getElementById("error-msg");

    const source = new EventSource("/stream");

    source.onmessage = function(event) {
        const data = JSON.parse(event.data);

        if (data.error) {
            errorBox.style.display = "block";
            errorMsg.textContent = data.error;
            source.close();
            return;
        }

        if (data.redirect) {
            window.location.href = data.redirect;
            source.close();
            return;
        }

        if (data.done) {
            window.location.href = "/results";
            source.close();
            return;
        }

        const p = document.createElement("p");
        p.textContent = "→ " + data.step;
        p.className = data.error
            ? "text-error text-sm"
            : "text-on-surface-variant text-sm";
        stepsDiv.appendChild(p);
        p.scrollIntoView({ behavior: "smooth" });
    };
</script>

</body>
</html>
